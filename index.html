<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>极简悬浮笔记</title>
    <link rel="icon" type="image/png" href="https://picsum.photos/seed/notes/32/32" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/notes/180/180" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="悬浮笔记" />
    <script>
      // Debug manifest accessibility
      fetch('manifest.json')
        .then(r => {
          console.log('PWA: manifest.json status:', r.status, r.headers.get('content-type'));
          return r.text();
        })
        .then(t => console.log('PWA: manifest.json first 20 chars:', t.substring(0, 20)))
        .catch(e => console.error('PWA: manifest.json fetch error:', e));

      // file://（Electron 安装包）下无法注册 Service Worker，且绝对路径 /sw.js 会加载失败
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
